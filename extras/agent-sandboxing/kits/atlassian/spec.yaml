schemaVersion: "2"
kind: mixin
name: atlassian
displayName: Atlassian Access
description: Proxy-managed Jira and Confluence credentials

network:
  allowedDomains:
    - "*.atlassian.net"
  serviceDomains:
    "wellsky.atlassian.net": atlassian
  serviceAuth:
    atlassian:
      headerName: Authorization
      valueFormat: "Basic %s"

credentials:
  sources:
    atlassian:
      env:
        - JIRA_API_TOKEN
      priority: env-first

agentContext: |
  ## Atlassian Credentials

  Jira and Confluence credentials are proxy-managed. The env vars
  `JIRA_USERNAME`, `JIRA_API_TOKEN`, and `JIRA_BASE_URL` contain
  placeholder values — the sandbox proxy replaces the Authorization
  header with real credentials on outbound requests to
  `wellsky.atlassian.net`. Never prompt for real credentials.

  A dummy `.claude/atlassian-credentials.json` is pre-populated in
  the workspace for tools that read credentials from file (e.g.,
  jira-connector agent). Use these values as-is.

environment:
  variables:
    JIRA_USERNAME: "proxy-managed"
    JIRA_API_TOKEN: "proxy-managed"
    JIRA_BASE_URL: "https://wellsky.atlassian.net"
  proxyManaged:
    - JIRA_API_TOKEN
