schemaVersion: "2"
kind: mixin
name: claude-code-patch
displayName: Claude Code Skill Override Patch
description: Patches Claude Code to allow skillOverrides for plugin-scoped skills

commands:
  startup:
    - command: ["bash", "-c", "claude update 2>/dev/null; bash /home/agent/patch-claude-code.sh"]
      description: Update Claude Code, then patch binary for plugin skill overrides

environment:
  variables:
    DISABLE_AUTOUPDATER: "1"
