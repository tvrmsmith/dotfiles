services:
  # Base mise-enabled Claude Code sandbox
  claude-sandbox-mise:
    build:
      context: .
      dockerfile: Dockerfile.claude-sandbox.mise
      secrets:
        - github_token
        - github_token_personal
      args:
        CLAUDE_CODE_USE_VERTEX: ${CLAUDE_CODE_USE_VERTEX:-1}
        CLOUD_ML_REGION: ${CLOUD_ML_REGION:-us}
        ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID:-consolo-dev-vertex-wsky}
        GIT_USER_NAME: ${GIT_USER_NAME}
        GIT_USER_EMAIL: ${GIT_USER_EMAIL}
    image: claude-sandbox-mise:latest
    container_name: claude-sandbox-mise

  # Ruby 2.6.10 sandbox (extends mise sandbox)
  claude-sandbox-ruby-2-6-10:
    build:
      context: .
      dockerfile: Dockerfile.claude-sandbox.ruby-2.6.10
    image: claude-sandbox-ruby-2.6.10:latest
    container_name: claude-sandbox-ruby-2-6-10
    depends_on:
      - claude-sandbox-mise


  # Oh My Pi coding agent sandbox
  omp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.omp-sandbox
      additional_contexts:
        omp-vertex-ext: ${HOME}/dev/personal/omp-extension-anthropic-vertex
      secrets:
        - github_token
        - github_token_personal
      args:
        GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-consolo-dev-vertex-wsky}
        GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us}
        OMP_MODEL: ${OMP_MODEL:-anthropic-vertex/claude-opus-4-7}
        GIT_USER_NAME: ${GIT_USER_NAME}
        GIT_USER_EMAIL: ${GIT_USER_EMAIL}
    image: omp-sandbox:latest
    container_name: omp-sandbox

secrets:
  github_token:
    environment: GITHUB_TOKEN
  github_token_personal:
    environment: GITHUB_TOKEN_PERSONAL
